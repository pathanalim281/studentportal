<!DOCTYPE html>
<html>
<head>
<title>College Student Management System</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#0044cc,#00c6ff,#7b2ff7);
min-height:100vh;
}

/* COLLEGE TITLE */
.college-title{
color:white;
text-align:center;
font-size:28px;
font-weight:bold;
margin-top:20px;
padding:10px;
}

/* LOGIN PAGE */
#loginPage{
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
min-height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
text-align:center;
width:90%;
max-width:320px;
}

.login-box h2{
color:#0044cc;
margin-bottom:20px;
}

.login-box input{
width:90%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

.loginbtn{
background:linear-gradient(90deg,#007bff,#00c6ff);
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
width:100%;
font-size:16px;
}

.loginbtn:hover{
background:linear-gradient(90deg,#0056b3,#0099cc);
}

/* DASHBOARD */
#dashboard{
display:none;
background:#f4f6f9;
min-height:100vh;
text-align:center;
}

h1{
background:#007bff;
color:white;
padding:15px;
margin:0;
font-size:24px;
}

.container{
width:90%;
margin:auto;
margin-top:20px;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px 15px;
border:none;
cursor:pointer;
}

.add{background:green;color:white;}
.edit{background:orange;color:white;}
.delete{background:red;color:white;}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
}

th{
background:#007bff;
color:white;
}

/* MOBILE RESPONSIVE */
@media (max-width:600px){

.college-title{
font-size:20px;
}

h1{
font-size:18px;
}

.login-box{
padding:25px;
}

table{
font-size:12px;
}

}
</style>

</head>

<body>

<div class="college-title">
    <br>
🎓 S.M.R.B.P. Polytechnic College</div>
</div>

<!-- LOGIN PAGE -->

<div id="loginPage">

<div class="login-box">

<h2>Admin Login</h2>

<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">

<button class="loginbtn" onclick="login()">Login</button>

</div>
</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<h1>Student Management System</h1>

<div class="container">

<input type="text" id="name" placeholder="Student Name">
<input type="text" id="roll" placeholder="Roll Number">
<input type="text" id="course" placeholder="Course">
<input type="number" id="totalfee" placeholder="Total Fee">
<input type="number" id="paidfee" placeholder="Paid Fee">

<br><br>

<button class="add" onclick="addStudent()">Add Student</button>

<br><br>

<input type="text" id="search" placeholder="Search Student" onkeyup="searchStudent()">

<br><br>

<table id="studentTable">

<thead>
<tr>
<th>Name</th>
<th>Roll</th>
<th>Course</th>
<th>Total Fee</th>
<th>Paid Fee</th>
<th>Pending</th>
<th>Action</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

/* LOGIN */

function login(){

let user=document.getElementById("user").value;
let pass=document.getElementById("pass").value;

if(user=="admin" && pass=="12345"){

document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="block";

}
else{
alert("Wrong Username or Password");
}

}

/* STUDENT SYSTEM */

let students = JSON.parse(localStorage.getItem("students")) || [];

function saveData(){
localStorage.setItem("students",JSON.stringify(students));
}

function displayStudents(){

let table=document.querySelector("#studentTable tbody");
table.innerHTML="";

students.forEach((s,index)=>{

let pending=s.totalfee - s.paidfee;

let row=`
<tr>
<td>${s.name}</td>
<td>${s.roll}</td>
<td>${s.course}</td>
<td>${s.totalfee}</td>
<td>${s.paidfee}</td>
<td>${pending}</td>
<td>
<button class="edit" onclick="editStudent(${index})">Edit</button>
<button class="delete" onclick="deleteStudent(${index})">Delete</button>
</td>
</tr>
`;

table.innerHTML += row;

});

}

function addStudent(){

let name=document.getElementById("name").value;
let roll=document.getElementById("roll").value;
let course=document.getElementById("course").value;
let totalfee=document.getElementById("totalfee").value;
let paidfee=document.getElementById("paidfee").value;

if(name==""||roll==""||course==""||totalfee==""||paidfee==""){
alert("Fill all fields");
return;
}

students.push({name,roll,course,totalfee,paidfee});

saveData();
displayStudents();

document.querySelectorAll(".container input").forEach(i=>i.value="");

}

function deleteStudent(index){
students.splice(index,1);
saveData();
displayStudents();
}

function editStudent(index){

let s=students[index];

document.getElementById("name").value=s.name;
document.getElementById("roll").value=s.roll;
document.getElementById("course").value=s.course;
document.getElementById("totalfee").value=s.totalfee;
document.getElementById("paidfee").value=s.paidfee;

students.splice(index,1);

saveData();
displayStudents();

}

function searchStudent(){

let input=document.getElementById("search").value.toLowerCase();
let rows=document.querySelectorAll("#studentTable tbody tr");

rows.forEach(row=>{

let name=row.children[0].innerText.toLowerCase();
row.style.display = name.includes(input) ? "" : "none";

});

}

displayStudents();

</script>

</body>
</html>
