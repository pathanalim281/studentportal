<!DOCTYPE html>
<html>
<head>
<title>Student Management System</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

h1{
background:#007bff;
color:white;
padding:12px;
}

.form{
margin:20px;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px 20px;
background:green;
color:white;
border:none;
cursor:pointer;
}

.search{
margin:20px;
}

table{
width:90%;
margin:auto;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:10px;
}

th{
background:#007bff;
color:white;
}

.delete{
background:red;
padding:5px 10px;
color:white;
border:none;
}

</style>

</head>

<body>

<h1>Student Management System</h1>

<div class="form">

<input type="text" id="name" placeholder="Student Name">
<input type="text" id="roll" placeholder="Roll Number">
<input type="text" id="course" placeholder="Course">

<input type="number" id="totalfee" placeholder="Total Fee">
<input type="number" id="paidfee" placeholder="Paid Fee">

<button onclick="addStudent()">Add Student</button>

</div>

<div class="search">

<input type="text" id="search" placeholder="Search Student Name" onkeyup="searchStudent()">

</div>

<table id="studentTable">

<tr>
<th>Name</th>
<th>Roll No</th>
<th>Course</th>
<th>Total Fee</th>
<th>Paid Fee</th>
<th>Pending Fee</th>
<th>Action</th>
</tr>

</table>

<script>

function addStudent(){

let name=document.getElementById("name").value;
let roll=document.getElementById("roll").value;
let course=document.getElementById("course").value;
let totalfee=document.getElementById("totalfee").value;
let paidfee=document.getElementById("paidfee").value;

if(name=="" || roll=="" || course=="" || totalfee=="" || paidfee==""){
alert("Please fill all fields");
return;
}

let pending = totalfee - paidfee;

let table=document.getElementById("studentTable");

let row=table.insertRow();

row.insertCell(0).innerHTML=name;
row.insertCell(1).innerHTML=roll;
row.insertCell(2).innerHTML=course;
row.insertCell(3).innerHTML=totalfee;
row.insertCell(4).innerHTML=paidfee;
row.insertCell(5).innerHTML=pending;

let action=row.insertCell(6);

action.innerHTML="<button class='delete' onclick='deleteStudent(this)'>Delete</button>";

document.getElementById("name").value="";
document.getElementById("roll").value="";
document.getElementById("course").value="";
document.getElementById("totalfee").value="";
document.getElementById("paidfee").value="";

}

function deleteStudent(btn){

let row=btn.parentNode.parentNode;
row.remove();

}

function searchStudent(){

let input=document.getElementById("search").value.toLowerCase();
let table=document.getElementById("studentTable");
let tr=table.getElementsByTagName("tr");

for(let i=1;i<tr.length;i++){

let td=tr[i].getElementsByTagName("td")[0];

if(td){

let text=td.textContent || td.innerText;

if(text.toLowerCase().indexOf(input)>-1){
tr[i].style.display="";
}
else{
tr[i].style.display="none";
}

}

}

}

</script>

</body>
</html>
